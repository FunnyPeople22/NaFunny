<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaFunny | My Links</title>
  <meta name="description" content="NaFunny — Dota 2, streams, community, social links" />
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0a1224;
      --card: rgba(255, 255, 255, 0.08);
      --card-2: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fb;
      --muted: #aeb8c9;
      --accent: #58a6ff;
      --accent-2: #7cc7ff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(88, 166, 255, 0.18), transparent 35%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 34px 24px 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .profile {
      text-align: center;
      margin-bottom: 28px;
    }

    .avatar {
      width: 132px;
      height: 132px;
      margin: 0 auto 18px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(88,166,255,0.25), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 12px 30px rgba(0,0,0,0.3);
      font-size: 46px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.35;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }

    .link-btn {
      width: 100%;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      min-height: 88px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 22px;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(88,166,255,0.48);
      background: linear-gradient(180deg, rgba(88,166,255,0.18), rgba(255,255,255,0.06));
      box-shadow: 0 10px 24px rgba(7, 20, 40, 0.35);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn svg {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      fill: currentColor;
      opacity: 0.95;
    }

    .support {
      border-color: rgba(88,166,255,0.45);
      background: linear-gradient(180deg, rgba(88,166,255,0.12), rgba(255,255,255,0.05));
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #7f8da3;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .card {
        border-radius: 26px;
        padding: 26px 16px 22px;
      }

      .avatar {
        width: 104px;
        height: 104px;
        border-radius: 24px;
        font-size: 36px;
      }

      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 18px;
      }

      .link-btn {
        min-height: 74px;
        border-radius: 18px;
        font-size: 18px;
        padding: 16px 18px;
      }

      .link-btn svg {
        width: 24px;
        height: 24px;
        flex-basis: 24px;
      }
    }
  </style>
</head>
