<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaFunny</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(88, 166, 255, 0.28), transparent 30%),
        radial-gradient(circle at top right, rgba(138, 92, 246, 0.20), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #050816 100%);
      color: #f5f7fb;
      min-height: 100vh;
      padding-bottom: 96px;
    }

    .page {
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      padding: 34px 18px 24px;
    }

    .hero {
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045));
      border-radius: 34px;
      padding: 34px 22px;
      box-shadow: 0 22px 60px rgba(0,0,0,0.42);
      text-align: center;
    }

    .logo {
      width: 116px;
      height: 116px;
      border-radius: 30px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, rgba(88,166,255,.38), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.18);
    }

    h1 {
      margin: 0;
      font-size: 52px;
      line-height: 1;
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 22px;
      color: #aeb8c9;
    }

    .main-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 26px;
    }

    .big-btn, .link-btn {
      text-decoration: none;
      color: #f5f7fb;
      border: 1px solid rgba(255,255,255,.13);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.045));
      border-radius: 22px;
      padding: 18px;
      font-weight: 800;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: .18s ease;
    }

    .big-btn:hover, .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(88,166,255,.55);
      background: linear-gradient(180deg, rgba(88,166,255,.20), rgba(255,255,255,.06));
    }

    .section {
      margin-top: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      border-radius: 28px;
      padding: 22px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .donate {
      border-color: rgba(88,166,255,.55);
      background: linear-gradient(180deg, rgba(88,166,255,.22), rgba(255,255,255,.06));
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: calc(100% - 28px);
      max-width: 620px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10, 17, 31, .88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 26px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
      z-index: 10;
    }

    .bottom-nav a {
      text-decoration: none;
      color: #dce6f7;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 6px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255,255,255,.045);
    }

    .bottom-nav a:hover {
      background: rgba(88,166,255,.20);
    }

    .footer {
      text-align: center;
      color: #7f8da3;
      margin-top: 22px;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 28px;
      }

      .hero {
        padding: 28px 16px;
      }

      .logo {
        width: 92px;
        height: 92px;
        font-size: 34px;
      }

      h1 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 18px;
      }

      .main-buttons {
        grid-template-columns: 1fr;
      }

      .big-btn, .link-btn {
        min-height: 64px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero" id="home">
      <div class="logo">NF</div>
      <h1>NaFunny</h1>
      <div class="subtitle">Dota 2 • Streams • Community</div>

      <div class="main-buttons">
        <a class="big-btn" href="https://youtube.com/@nafunny22?si=a0QX2qrGCs_TIsA6" target="_blank">▶ YouTube</a>
        <a class="big-btn" href="https://t.me/NaFunny" target="_blank">✈ Telegram</a>
      </div>
    </section>

    <section class="section" id="links">
      <h2>My Links</h2>
      <div class="grid">
        <a class="link-btn" href="https://discord.gg/SkMuqVseE" target="_blank">🎮 Discord</a>
        <a class="link-btn" href="https://www.instagram.com/nafunny22?igsh=MTJhdjRnbTE0em52aQ==" target="_blank">📸 Instagram</a>
        <a class="link-btn" href="https://www.tiktok.com/@nafunny22?_r=1&_t=ZS-97fcdm76nPs" target="_blank">🎵 TikTok</a>
        <a class="link-btn" href="https://vk.ru/club237993267" target="_blank">VK Group</a>
      </div>
    </section>

    <section class="section" id="support">
      <h2>Support</h2>
      <div class="grid">
        <a class="link-btn donate" href="https://www.donationalerts.com/r/nafunny2" target="_blank">💙 Support Me</a>
      </div>
    </section>

    <div class="footer">© NaFunny</div>
  </main>

  <nav class="bottom-nav">
    <a href="#home">Home</a>
    <a href="#links">Links</a>
    <a href="https://youtube.com/@nafunny22?si=a0QX2qrGCs_TIsA6" target="_blank">YouTube</a>
    <a href="#support">Donate</a>
  </nav>
</body>
</html>
