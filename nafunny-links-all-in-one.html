<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaFunny Links</title>

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
* {
  box-sizing: border-box;
}

:root {
  --bg: #0f1117;
  --card: rgba(255, 255, 255, 0.06);
  --card-border: rgba(255, 255, 255, 0.12);
  --text: #f5f7fb;
  --muted: rgba(245, 247, 251, 0.72);
  --button: rgba(255, 255, 255, 0.07);
  --button-hover: rgba(255, 255, 255, 0.12);
  --accent: #7dd3fc;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(125, 211, 252, 0.12), transparent 34rem),
    var(--bg);
  color: var(--text);
}

.page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px 16px;
}

.profile-card {
  width: 100%;
  max-width: 520px;
  padding: 30px 18px 22px;
  border: 1px solid var(--card-border);
  border-radius: 28px;
  background: var(--card);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(10px);
}

.logo-wrap {
  width: 86px;
  height: 86px;
  margin: 0 auto 18px;
  display: grid;
  place-items: center;
  border-radius: 24px;
  border: 1px solid var(--card-border);
  background: rgba(255, 255, 255, 0.08);
}

.logo-text {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.06em;
}

h1 {
  margin: 0;
  text-align: center;
  font-size: 36px;
  line-height: 1;
}

.subtitle {
  margin: 10px 0 24px;
  text-align: center;
  color: var(--muted);
  font-size: 15px;
}

.links-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.social-button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;

  width: 100%;
  padding: 15px 18px;

  border-radius: 16px;
  border: 1px solid var(--card-border);

  background: var(--button);
  color: var(--text);
  text-decoration: none;

  font-size: 17px;
  font-weight: 700;

  transition:
    transform 0.2s ease,
    background 0.2s ease,
    border-color 0.2s ease,
    box-shadow 0.2s ease;
}

.social-button i {
  width: 24px;
  text-align: center;
  font-size: 22px;
}

.social-button:hover {
  transform: translateY(-2px);
  background: var(--button-hover);
  border-color: rgba(255, 255, 255, 0.22);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
}

.social-button:active {
  transform: translateY(0);
}

.support-button {
  border-color: rgba(125, 211, 252, 0.28);
}

.support-button i {
  color: var(--accent);
}

@media (max-width: 480px) {
  .page {
    padding: 24px 14px;
  }

  .profile-card {
    padding: 26px 14px 18px;
    border-radius: 24px;
  }

  h1 {
    font-size: 32px;
  }

  .social-button {
    padding: 14px 16px;
    font-size: 16px;
    border-radius: 14px;
  }

  .social-button i {
    font-size: 20px;
  }
}

</style>
</head>
<body>
  <main class="page">
    <section class="profile-card">
      <div class="logo-wrap">
        <div class="logo-text">NF</div>
      </div>

      <h1>NaFunny</h1>
      <p class="subtitle">Dota 2 • Streams • Community</p>

      <section class="links-section" aria-label="NaFunny social links">
        <a class="social-button" href="https://youtube.com/@nafunny22?si=a0QX2qrGCs_TIsA6" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-youtube" aria-hidden="true"></i>
          <span>YouTube</span>
        </a>

        <a class="social-button" href="https://discord.gg/SkMuqVseE" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-discord" aria-hidden="true"></i>
          <span>Discord</span>
        </a>

        <a class="social-button" href="https://www.instagram.com/nafunny22?igsh=MTJhdjRnbTE0em52aQ==" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          <span>Instagram</span>
        </a>

        <a class="social-button" href="https://www.tiktok.com/@nafunny22?_r=1&_t=ZS-97fcdm76nPs" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
          <span>TikTok</span>
        </a>

        <a class="social-button" href="https://vk.ru/club237993267" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-vk" aria-hidden="true"></i>
          <span>VK Group</span>
        </a>

        <a class="social-button support-button" href="https://www.donationalerts.com/r/nafunny2" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-heart" aria-hidden="true"></i>
          <span>Support Me</span>
        </a>
      </section>
    </section>
  </main>
</body>
</html>
